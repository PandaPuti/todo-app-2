<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo-List-App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="container">
    <button onclick="toggleTheme()" class="theme-button">CHANGE THEME</button>
    <div class="todo-app">
      <h2>Todo-List</h2>
      <div class="row">
        <input type="text" placeholder="Enter your todo task" id="input-box">
        <button onclick="addTask()" class="add-button">ADD</button>
      </div>
      <ul id="list-container">
      </ul>
      <button onclick="clearTask()">CLEAR LIST</button>
    </div>
  </div>


  <script src="app.js"></script>
</body>
</html>
